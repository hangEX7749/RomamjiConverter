<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <defs>
    <!-- Vibrant Green Glow Effects -->
    <linearGradient id="neonGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1DB954" />
      <stop offset="100%" stop-color="#1ed760" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Background Match -->
  <rect width="100%" height="100%" fill="#0F0F0F" rx="16"/>

  <g transform="translate(25, 15)">
    <!-- Icon: Soundwave R-Symbol -->
    <g filter="url(#glow)">
      <!-- R-Stem Audio Bars -->
      <rect x="20" y="30" width="8" height="60" rx="4" fill="url(#neonGreen)" />
      <rect x="34" y="40" width="8" height="40" rx="4" fill="url(#neonGreen)" />
      
      <!-- R-Loop Sound Array -->
      <path d="M 42 40 C 75 40, 85 60, 42 70" fill="none" stroke="url(#neonGreen)" stroke-width="8" stroke-linecap="round" />
      
      <!-- Translation Vector Kick -->
      <path d="M 50 70 L 80 100" fill="none" stroke="url(#neonGreen)" stroke-width="8" stroke-linecap="round" />
    </g>

    <!-- Typography Design -->
    <text x="110" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" letter-spacing="0.5">
      Romaji<tspan fill="#1DB954">Fy</tspan>
    </text>
    
    <!-- Subtitle Description -->
    <text x="112" y="94" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" fill="#666666" letter-spacing="3">
      LYRICS TRANSLITERATOR
    </text>
  </g>
</svg>
